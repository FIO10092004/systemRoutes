<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Workers - InformaTech</title>
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #10b981;
            --accent: #059669;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            color: #064e3b;
            min-height: 100vh;
        }

        .form-container {
            max-width: 800px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .header-logo {
            font-weight: 800;
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -1px;
        }

        .form-label {
            font-weight: 600;
            font-size: 13px;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            background: #fff;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
        }

        .btn-primary:hover {
            background: var(--accent);
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
        }

        .auth-section {
            background: rgba(16, 185, 129, 0.05);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(16, 185, 129, 0.1);
            margin: 20px 0;
        }
    </style>
</head>

<body>

    <div id="loadingOverlay">
        <div class="spinner-border text-success" role="status"></div>
        <span class="mt-2 fw-bold">Registrando Worker...</span>
    </div>

    <div class="container">
        <div class="form-container">
            <div class="header-logo">
                <i class="bi bi-person-badge-fill"></i> InformaTech <span class="text-dark">| Registro de Worker</span>
            </div>

            <div id="connStatus" class="alert alert-info py-2 px-3 mb-4 d-flex align-items-center justify-content-between" style="font-size: 13px; border-radius: 12px;">
                <span><i class="bi bi-wifi"></i> Estado del Servidor: <strong id="statusLabel">Verificando...</strong></span>
                <button type="button" class="btn btn-sm btn-link p-0 text-decoration-none fw-bold" onclick="checkConnection()">Reintentar</button>
            </div>

            <form id="registroForm">
                <div class="row g-3">

                    <div class="auth-section">
                        <h6 class="mb-3 fw-bold text-success">CREDENCIALES DE ACCESO</h6>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Usuario</label>
                                <input type="text" name="username" class="form-control" required
                                    placeholder="Ej. jperez">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="password" class="form-control" required
                                    placeholder="••••••••">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Nombres</label>
                        <input type="text" name="nombres" class="form-control" required placeholder="Ej. Juan">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Apellidos</label>
                        <input type="text" name="apellidos" class="form-control" required placeholder="Ej. Pérez">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Tipo de Documento</label>
                        <select name="tipo_documento" class="form-select" required>
                            <option value="DNI">DNI</option>
                            <option value="CE">Carnet Extranjería</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Número de Documento</label>
                        <input type="text" name="numero_documento" class="form-control" required placeholder="12345678">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Departamento</label>
                        <select id="departamento" name="departamento" class="form-select" required>
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Provincia</label>
                        <select id="provincia" name="provincia" class="form-select" required>
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Distrito</label>
                        <select id="distrito" name="distrito" class="form-select" required>
                            <option value="">Seleccione...</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Dirección</label>
                        <input type="text" name="direccion" class="form-control" required placeholder="Calle Falsa 123">
                    </div>

                    <div class="col-12">
                        <div class="d-flex justify-content-between align-items-center">
                            <label class="form-label mb-0">Ubicación GPS Actual</label>
                            <button type="button" class="btn btn-sm btn-outline-success" onclick="detectLocation()">
                                <i class="bi bi-geo-alt"></i> Fijar mi ubicación
                            </button>
                        </div>
                        <div class="row g-2 mt-1">
                            <div class="col-6">
                                <label class="small text-muted mb-1">Latitud (Auto)</label>
                                <input type="text" id="latitud" name="latitud" class="form-control form-control-sm bg-light" readonly placeholder="0.000000">
                            </div>
                            <div class="col-6">
                                <label class="small text-muted mb-1">Longitud (Auto)</label>
                                <input type="text" id="longitud" name="longitud" class="form-control form-control-sm bg-light" readonly placeholder="0.000000">
                            </div>
                        </div>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary w-100 text-white">
                            CREAR CUENTA DE WORKER
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: 'http://localhost:4000' para local
        const API_BASE = 'http://localhost:4000';

        const ubigeoData = {
            "LIMA": {
                "LIMA": ["LIMA", "SANTIAGO DE SURCO", "SAN BORJA", "MIRAFLORES", "LA MOLINA", "SAN ISIDRO", "LOS OLIVOS", "SAN MARTIN DE PORRES"],
                "HUAURA": ["HUACHO", "HUAURA", "SAYAN"]
            },
            "AREQUIPA": {
                "AREQUIPA": ["AREQUIPA", "CERRO COLORADO", "YANAHUARA"],
                "CAYLLOMA": ["CHIVAY", "CABANACONDE"]
            }
        };

        const depSel = document.getElementById('departamento');
        const provSel = document.getElementById('provincia');
        const distSel = document.getElementById('distrito');

        Object.keys(ubigeoData).forEach(dep => {
            depSel.innerHTML += `<option value="${dep}">${dep}</option>`;
        });

        depSel.onchange = () => {
            provSel.innerHTML = '<option value="">Seleccione...</option>';
            distSel.innerHTML = '<option value="">Seleccione...</option>';
            if (depSel.value) {
                Object.keys(ubigeoData[depSel.value]).forEach(prov => {
                    provSel.innerHTML += `<option value="${prov}">${prov}</option>`;
                });
            }
        };

        provSel.onchange = () => {
            distSel.innerHTML = '<option value="">Seleccione...</option>';
            if (provSel.value) {
                ubigeoData[depSel.value][provSel.value].forEach(dist => {
                    distSel.innerHTML += `<option value="${dist}">${dist}</option>`;
                });
            }
        };

        function detectLocation() {
            const overlay = document.getElementById('loadingOverlay');
            const statusText = overlay.querySelector('span');
            
            if (navigator.geolocation) {
                statusText.innerText = "Encendiendo GPS...";
                overlay.style.display = 'flex';
                
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('latitud').value = pos.coords.latitude.toFixed(8);
                    document.getElementById('longitud').value = pos.coords.longitude.toFixed(8);
                    overlay.style.display = 'none';
                    statusText.innerText = "Registrando Worker...";
                }, err => {
                    overlay.style.display = 'none';
                    alert("Error de GPS: Verifique permisos y conexión.");
                    statusText.innerText = "Registrando Worker...";
                }, {
                    enableHighAccuracy: true,
                    timeout: 10000
                });
            }
        }

        async function checkConnection() {
            const label = document.getElementById('statusLabel');
            const statusBox = document.getElementById('connStatus');
            label.innerText = "Conectando...";
            try {
                const res = await fetch(`${API_BASE}/api/health`, { method: 'GET' });
                if (res.ok) {
                    label.innerText = "ONLINE";
                    statusBox.classList.replace('alert-info', 'alert-success');
                    statusBox.classList.replace('alert-danger', 'alert-success');
                } else {
                    throw new Error();
                }
            } catch (e) {
                label.innerText = "OFFLINE (Verifique URL o Firewall)";
                statusBox.classList.replace('alert-info', 'alert-danger');
                statusBox.classList.replace('alert-success', 'alert-danger');
            }
        }
        checkConnection();

        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loadingOverlay').style.display = 'flex';

            const formData = new FormData(e.target);

            try {
                const url = `${API_BASE}/api/public/registro-worker`;
                console.log("Intentando conectar a:", url);
                const res = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    alert("¡Worker registrado con éxito! Ya puede iniciar sesión en la App.");
                    location.reload();
                } else {
                    alert("Error en el Servidor:\n" + (data.details || data.error || "Error desconocido"));
                    console.error("Detalles del error:", data);
                }
            } catch (err) {
                console.error("Error completo:", err);
                alert("No se pudo conectar con el servidor.\nURL intentada: " + url + "\nError: " + err.message);
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        };
    </script>
</body>

</html>

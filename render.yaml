services:
  # 1. Backend API (Web Service)
  - type: web
    name: rutazero-backend
    env: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rutazero-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rutazero-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 2. Portal Web (Static Site)
  - type: web
    name: rutazero-portal
    runtime: static
    rootDir: portal-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://rutazero-backend-s7rw.onrender.com

  # 3. Redis Service
  - type: redis
    name: rutazero-redis
    plan: free
    region: ohio
    ipAllowList:
      - source: 0.0.0.0/0
        description: "Allow all connections"

databases:
  # 4. PostgreSQL Database
  - name: rutazero-db
    plan: free
    region: ohio

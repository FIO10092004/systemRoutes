services:
  # Base de Datos con PostGIS
  db:
    image: postgis/postgis:15-3.3
    container_name: rutazero_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rutazero
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass123
    ports:
      - "5433:5432" # Mapeo: Puerto 5433 en tu PC -> 5432 dentro de Docker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d # Para inicializar el esquema si es necesario
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rutazero"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
